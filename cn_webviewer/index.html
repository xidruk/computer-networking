<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Computer Networking</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- SIDEBAR BACKDROP (mobile only) -->
<div id="sidebar-backdrop"></div>

<!-- TOP BAR -->
<div id="bar">
  <!-- LEFT: hamburger (mobile) + icon + title -->
  <div id="bar-left">
    <button id="btn-menu" aria-label="Toggle menu">&#9776;</button>
    <span id="bar-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
        <circle cx="12" cy="10" r="2" fill="currentColor" stroke="none" opacity=".4"/>
        <path d="M8 10h1M15 10h1M12 7v1M12 12v1" stroke-width="1.2"/>
      </svg>
    </span>
    <span id="bar-title">C@mputer Networking</span>
  </div>

  <div id="bar-spacer"></div>

  <!-- RIGHT: stats, links, search, theme -->
  <div id="bar-right">
    <span class="bar-stat">&#9733; Stars <b id="gh-stars">—</b></span>
    <span class="bar-stat">&#10231; Forks <b id="gh-forks">—</b></span>

    <a class="bar-social" href="https://github.com/xidruk/" target="_blank">GitHub</a>
    <a class="bar-social" href="https://x.com/xidruk" target="_blank">X</a>
    <a class="bar-social" href="https://www.linkedin.com/in/khalid-barkan-36a628365/" target="_blank">LinkedIn</a>
    <a class="bar-social" href="https://xidruk.substack.com/" target="_blank">Substack</a>

    <button id="btn-search">
      &#9906; SEARCH <kbd>Ctrl+K</kbd>
    </button>
    <button id="btn-theme">[ &#9788; ]</button>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div id="layout">

  <!-- SIDEBAR -->
  <div id="sidebar"></div>

  <!-- CONTENT -->
  <div id="main">
    <div id="doc"><p class="spin">&gt;&gt; loading...</p></div>
  </div>

</div>

<!-- marked.js cdn -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="lookup_bar.js"></script>
<script src="app.js"></script>

<!-- Live GitHub stats -->
<script>
(function() {
  fetch('https://api.github.com/repos/xidruk/computer-networking')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var s = document.getElementById('gh-stars');
      var f = document.getElementById('gh-forks');
      if (s) s.textContent = d.stargazers_count;
      if (f) f.textContent = d.forks_count;
    })
    .catch(function() {});
})();
</script>
</body>
</html>
